name: Smart Money Radar Auto-Refresh

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  refresh-data:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/with-python@v5
      with:
        python-version: '3.11'

    - name: Install System and Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Core Data Engine
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python 01_Data_Engine/core_engine.py

    - name: Commit and Push Updated Insider Vault DB
      run: |
        git config --global user.name "SmartMoneyRadar-Bot"
        git config --global user.email "bot@smartmoneyradar.com"
        git add 02_Database/insider_vault.db
        git diff --quiet && git diff --staged --quiet || (git commit -m "Automated Data Update: Sync Insider Vault" && git push)